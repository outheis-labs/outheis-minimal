<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" type="image/png" href="{{ '/favicon-96x96.png' | relative_url }}" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --font-body: "Source Serif 4", Georgia, "Times New Roman", serif;
      --font-heading: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --color-text: #1a1a1a;
      --color-muted: #666;
      --color-border: #e0e0e0;
      --color-bg-code: #f7f7f7;
    }
    
    @supports (font-variation-settings: normal) {
      :root {
        --font-heading: "Inter var", -apple-system, BlinkMacSystemFont, sans-serif;
      }
    }
    
    html, body {
      width: 100%;
      min-height: 100vh;
      background: #fff;
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.7;
      color: var(--color-text);
    }
    
    .container {
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem;
      gap: 5rem;
    }
    
    .sidebar {
      flex: 0 0 180px;
      position: sticky;
      top: 3rem;
      height: fit-content;
    }
    
    .sidebar-logo {
      display: block;
      width: 72px;
      height: 72px;
      margin-bottom: 2rem;
    }
    
    .sidebar-title {
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 2.5rem;
    }
    
    .sidebar-nav {
      list-style: none;
    }
    
    .sidebar-nav li {
      margin-bottom: 0.75rem;
    }
    
    .sidebar-nav a {
      font-family: var(--font-heading);
      color: var(--color-text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
    }
    
    .sidebar-nav a:hover {
      text-decoration: underline;
    }
    
    .content {
      flex: 1;
      min-width: 0;
      max-width: 680px;
    }
    
    .content h1 {
      font-family: var(--font-heading);
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 2rem;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    
    .content h2 {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 600;
      margin-top: 3rem;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }
    
    .content h3 {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
    }
    
    .content p {
      margin-bottom: 1.5rem;
    }
    
    .content a {
      color: var(--color-text);
    }
    
    .content ul, .content ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }
    
    .content li {
      margin-bottom: 0.5rem;
    }
    
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
      font-family: var(--font-heading);
      font-size: 14px;
    }
    
    .content th, .content td {
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--color-border);
    }
    
    .content th {
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-muted);
    }
    
    .content code {
      font-family: var(--font-mono);
      font-size: 15px;
      background: var(--color-bg-code);
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }
    
    .content pre {
      background: var(--color-bg-code);
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin: 2rem 0;
      font-size: 14px;
      border-radius: 4px;
      line-height: 1.5;
    }
    
    .content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
    }
    
    .content hr {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: 3rem 0;
    }
    
    .content strong {
      font-weight: 600;
    }
    
    .content em {
      font-style: italic;
    }
    
    .content blockquote {
      border-left: 3px solid var(--color-border);
      padding-left: 1.5rem;
      margin: 2rem 0;
      color: var(--color-muted);
      font-style: italic;
    }
    
    /* Mobile */
    @media (max-width: 768px) {
      html, body {
        font-size: 16px;
      }
      
      .container {
        flex-direction: column;
        padding: 1.5rem;
        gap: 2rem;
      }
      
      .sidebar {
        position: static;
        flex: none;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 1rem;
      }
      
      .sidebar-logo {
        width: 48px;
        height: 48px;
        margin-bottom: 0;
      }
      
      .sidebar-title {
        font-size: 14px;
        margin-bottom: 0;
        flex: 1;
      }
      
      .sidebar-nav {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 1.25rem;
      }
      
      .sidebar-nav li {
        margin-bottom: 0;
      }
      
      .content h1 {
        font-size: 26px;
      }
      
      .content h2 {
        font-size: 18px;
        margin-top: 2.5rem;
      }
      
      .content pre {
        font-size: 13px;
        padding: 1rem;
      }
      
      .content table {
        font-size: 13px;
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <img src="{{ '/assets/logo.svg' | relative_url }}" alt="outheis" class="sidebar-logo">
      <div class="sidebar-title">outheis</div>
      <nav>
        <ul class="sidebar-nav">
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/philosophy/' | relative_url }}">Philosophy</a></li>
          <li><a href="{{ '/theory/' | relative_url }}">Theory</a></li>
          <li><a href="{{ '/architecture/' | relative_url }}">Architecture</a></li>
          <li><a href="{{ '/implementation/' | relative_url }}">Implementation</a></li>
          <li><a href="{{ '/guide/' | relative_url }}">Guide</a></li>
          <li><a href="https://github.com/outheis-labs/outheis-minimal">GitHub</a></li>
        </ul>
      </nav>
    </aside>
    <main class="content">
      {{ content }}
    </main>
  </div>
</body>
</html>
