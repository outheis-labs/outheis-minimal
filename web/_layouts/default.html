<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" type="image/png" href="{{ '/favicon-96x96.png' | relative_url }}" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      font-feature-settings: "liga" 1, "calt" 1;
    }
    @supports (font-variation-settings: normal) {
      :root { font-family: InterVariable, Inter, system-ui, sans-serif; }
    }
    
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body {
      background: #fff;
      color: #000;
      line-height: 1.6;
      min-height: 100vh;
    }
    
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 3rem;
    }
    
    .logo {
      width: 40px;
      height: 40px;
    }
    
    .site-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    
    .site-title a {
      color: inherit;
      text-decoration: none;
    }
    
    nav {
      margin-bottom: 4rem;
    }
    
    nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
    }
    
    nav a {
      font-size: 0.875rem;
      color: #666;
      text-decoration: none;
      transition: color 0.15s;
    }
    
    nav a:hover {
      color: #000;
    }
    
    nav a.active {
      color: #000;
    }
    
    .content h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }
    
    .content h2 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
    }
    
    .content h3 {
      font-size: 0.875rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }
    
    .content p {
      margin-bottom: 1rem;
      color: #333;
    }
    
    .content p:first-of-type {
      color: #666;
    }
    
    .content a {
      color: #000;
      text-decoration: underline;
      text-decoration-color: #ccc;
      text-underline-offset: 2px;
    }
    
    .content a:hover {
      text-decoration-color: #000;
    }
    
    .content strong {
      font-weight: 600;
    }
    
    .content em {
      font-style: italic;
    }
    
    .content ul, .content ol {
      margin-bottom: 1rem;
      padding-left: 1.25rem;
      color: #333;
    }
    
    .content li {
      margin-bottom: 0.35rem;
    }
    
    .content code {
      font-family: "SF Mono", SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.875em;
      background: #f5f5f5;
      padding: 0.15em 0.35em;
      border-radius: 3px;
    }
    
    .content pre {
      background: #f5f5f5;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      border-radius: 6px;
      font-size: 0.8125rem;
      line-height: 1.5;
    }
    
    .content pre code {
      background: none;
      padding: 0;
      font-size: inherit;
    }
    
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.875rem;
    }
    
    .content th {
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      padding: 0.5rem 0.75rem 0.5rem 0;
      border-bottom: 1px solid #e5e5e5;
    }
    
    .content td {
      padding: 0.5rem 0.75rem 0.5rem 0;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }
    
    .content blockquote {
      border-left: 2px solid #e5e5e5;
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: #666;
    }
    
    .content hr {
      border: none;
      border-top: 1px solid #e5e5e5;
      margin: 3rem 0 1.5rem;
    }
    
    .footer {
      font-size: 0.8125rem;
      color: #999;
    }
    
    .footer a {
      color: #666;
      text-decoration: none;
    }
    
    .footer a:hover {
      color: #000;
    }
    
    @media (max-width: 600px) {
      .container {
        padding: 2rem 1.25rem;
      }
      
      .header {
        margin-bottom: 2rem;
      }
      
      nav {
        margin-bottom: 2.5rem;
      }
      
      .content h1 {
        font-size: 1.625rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/logo.svg' | relative_url }}" alt="" class="logo">
      </a>
      <div class="site-title"><a href="{{ '/' | relative_url }}">outheis</a></div>
    </header>
    
    <nav>
      <ul>
        <li><a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a></li>
        <li><a href="{{ '/philosophy/' | relative_url }}" class="{% if page.url contains '/philosophy' %}active{% endif %}">Philosophy</a></li>
        <li><a href="{{ '/theory/' | relative_url }}" class="{% if page.url contains '/theory' %}active{% endif %}">Theory</a></li>
        <li><a href="{{ '/architecture/' | relative_url }}" class="{% if page.url contains '/architecture' %}active{% endif %}">Architecture</a></li>
        <li><a href="{{ '/memory/' | relative_url }}" class="{% if page.url contains '/memory' %}active{% endif %}">Memory</a></li>
        <li><a href="{{ '/implementation/' | relative_url }}" class="{% if page.url contains '/implementation' %}active{% endif %}">Implementation</a></li>
        <li><a href="{{ '/guide/' | relative_url }}" class="{% if page.url contains '/guide' %}active{% endif %}">Guide</a></li>
        <li><a href="https://github.com/outheis-labs/outheis-minimal">GitHub ↗</a></li>
      </ul>
    </nav>
    
    <main class="content">
      {{ content }}
      
      <hr>
      <p class="footer">AGPL-3.0 · <a href="https://github.com/outheis-labs/outheis-minimal">Source</a></p>
    </main>
  </div>
</body>
</html>
