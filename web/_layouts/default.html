<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" type="image/png" href="{{ '/favicon-96x96.png' | relative_url }}" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      width: 100%;
      min-height: 100vh;
      background: #fff;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #000;
      font-feature-settings: "cv01", "cv02", "cv03", "cv04";
    }
    
    @supports (font-variation-settings: normal) {
      html, body {
        font-family: "Inter var", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
    }
    
    .container {
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      gap: 4rem;
    }
    
    .sidebar {
      flex: 0 0 200px;
      position: sticky;
      top: 2rem;
      height: fit-content;
    }
    
    .sidebar-logo {
      display: block;
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
    }
    
    .sidebar-title {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    
    .sidebar-nav {
      list-style: none;
    }
    
    .sidebar-nav li {
      margin-bottom: 0.5rem;
    }
    
    .sidebar-nav a {
      color: #000;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.05em;
    }
    
    .sidebar-nav a:hover {
      text-decoration: underline;
    }
    
    .content {
      flex: 1;
      min-width: 0;
    }
    
    .content h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }
    
    .content h2 {
      font-size: 16px;
      font-weight: 700;
      margin-top: 2rem;
      margin-bottom: 1rem;
    }
    
    .content h3 {
      font-size: 14px;
      font-weight: 700;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }
    
    .content p {
      margin-bottom: 1rem;
    }
    
    .content a {
      color: #000;
    }
    
    .content ul, .content ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }
    
    .content li {
      margin-bottom: 0.25rem;
    }
    
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 13px;
    }
    
    .content th, .content td {
      text-align: left;
      padding: 0.5rem;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .content th {
      font-weight: 700;
    }
    
    .content code {
      font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      background: #f5f5f5;
      padding: 0.1em 0.3em;
    }
    
    .content pre {
      background: #f5f5f5;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
      font-size: 13px;
    }
    
    .content pre code {
      background: none;
      padding: 0;
    }
    
    .content hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 2rem 0;
    }
    
    .content strong {
      font-weight: 700;
    }
    
    /* Mobile */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        padding: 1rem;
        gap: 1.5rem;
      }
      
      .sidebar {
        position: static;
        flex: none;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 1rem;
      }
      
      .sidebar-logo {
        width: 48px;
        height: 48px;
        margin-bottom: 0;
      }
      
      .sidebar-title {
        font-size: 16px;
        margin-bottom: 0;
        flex: 1;
      }
      
      .sidebar-nav {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 1rem;
      }
      
      .sidebar-nav li {
        margin-bottom: 0;
      }
      
      .sidebar-nav a {
        font-size: 13px;
      }
      
      .content h1 {
        font-size: 20px;
      }
      
      .content h2 {
        font-size: 15px;
      }
      
      .content pre {
        font-size: 11px;
        padding: 0.75rem;
      }
      
      .content table {
        font-size: 11px;
        display: block;
        overflow-x: auto;
      }
      
      .content th, .content td {
        padding: 0.35rem;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <img src="{{ '/assets/logo.svg' | relative_url }}" alt="outheis" class="sidebar-logo">
      <div class="sidebar-title">outheis</div>
      <nav>
        <ul class="sidebar-nav">
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/philosophy/' | relative_url }}">Philosophy</a></li>
          <li><a href="{{ '/theory/' | relative_url }}">Theory</a></li>
          <li><a href="{{ '/architecture/' | relative_url }}">Architecture</a></li>
          <li><a href="{{ '/implementation/' | relative_url }}">Implementation</a></li>
          <li><a href="{{ '/guide/' | relative_url }}">Guide</a></li>
          <li><a href="https://github.com/outheis-labs/outheis-minimal">GitHub</a></li>
        </ul>
      </nav>
    </aside>
    <main class="content">
      {{ content }}
    </main>
  </div>
</body>
</html>
